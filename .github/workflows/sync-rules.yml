name: Sync Surge Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 */7 * *" # 每 7 天运行一次（约 10:20 Asia/Shanghai）

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync rules
        run: bash scripts/sync-rules.sh
